{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - HealthAnalytics IPS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-3">Iniciar sesión</h3>

            <div class="alert alert-danger d-none" id="errBox" role="alert"></div>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input class="form-control" type="text" name="username" id="username" autocomplete="username" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input class="form-control" type="password" name="password" id="password" autocomplete="current-password" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Entrar</button>
            </form>

            <div class="mt-3 small text-muted">
              Usa tu usuario registrado. Se generará un JWT y se cargará el dashboard.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('errBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('d-none');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Error de autenticación');

        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);
        window.location.href = '/dashboard/';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
