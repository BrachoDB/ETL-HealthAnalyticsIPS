<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8f9fa"/>
  <text x="40" y="55" fill="#212529" font-size="30" font-family="Arial">Exportaciones del Dashboard</text>
  <rect x="40" y="100" width="220" height="120" rx="12" fill="#0d6efd"/>
  <text x="75" y="155" fill="white" font-size="22" font-family="Arial">Excel</text>
  <text x="75" y="190" fill="white" font-size="16" font-family="Arial">pacientes.xlsx</text>
  <rect x="310" y="100" width="220" height="120" rx="12" fill="#198754"/>
  <text x="350" y="155" fill="white" font-size="22" font-family="Arial">CSV</text>
  <text x="350" y="190" fill="white" font-size="16" font-family="Arial">pacientes.csv</text>
  <rect x="580" y="100" width="220" height="120" rx="12" fill="#dc3545"/>
  <text x="625" y="155" fill="white" font-size="22" font-family="Arial">PDF</text>
  <text x="625" y="190" fill="white" font-size="16" font-family="Arial">pacientes.pdf</text>
  <rect x="40" y="300" width="1040" height="220" rx="12" fill="white" stroke="#dee2e6"/>
  <text x="75" y="350" fill="#212529" font-size="22" font-family="Arial">Endpoint</text>
  <text x="75" y="395" fill="#212529" font-size="18" font-family="Arial">GET /api/analytics/export/xlsx/</text>
  <text x="75" y="435" fill="#212529" font-size="18" font-family="Arial">GET /api/analytics/export/csv/</text>
  <text x="75" y="475" fill="#212529" font-size="18" font-family="Arial">GET /api/analytics/export/pdf/</text>
</svg>
