  <rect x="40" y="540" width="1040" height="80" rx="10" fill="white" stroke="#dee2e6"/>
  <text x="70" y="590" fill="#212529" font-size="20" font-family="Arial">GET /api/analytics/export/&lt;formato&gt;/</text>
</svg>
